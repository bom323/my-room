<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進階選色房間</title>
    <style>
        body { font-family: 'PingFang TC', sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .header { margin-bottom: 20px; text-align: center; }
        .room-info { color: #888; font-size: 0.9rem; margin-top: 5px; }

        /* 選擇顏色區 */
        .color-picker { display: flex; gap: 20px; margin-bottom: 30px; background: #222; padding: 15px 25px; border-radius: 50px; border: 1px solid #444; }
        .color-btn { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; position: relative; }
        .color-btn.active::after { content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-weight: bold; }
        .color-btn.active { border-color: white; transform: scale(1.1); }
        
        /* 網格區 */
        .grid { display: grid; grid-template-rows: repeat(10, 1fr); gap: 15px; }
        .row { display: flex; gap: 12px; align-items: center; background: #1e1e1e; padding: 8px 15px; border-radius: 10px; }
        .row-label { width: 70px; color: #666; font-size: 0.85rem; font-weight: bold; }
        
        .cell {
            width: 55px; height: 45px; background: #333; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: bold; transition: all 0.2s; color: #888;
        }
        .cell:hover { background: #444; transform: translateY(-2px); }

        /* 顏色樣式 */
        .bg-red { background-color: #ff4d4d !important; color: white; box-shadow: 0 0 10px rgba(255,77,77,0.3); }
        .bg-blue { background-color: #4d94ff !important; color: white; box-shadow: 0 0 10px rgba(77,148,255,0.3); }
        .bg-green { background-color: #4dff88 !important; color: #004d1a; box-shadow: 0 0 10px rgba(77,255,136,0.3); }
        .bg-yellow { background-color: #ffdb4d !important; color: #4d4000; box-shadow: 0 0 10px rgba(255,219,77,0.3); }

        /* 重置按鈕 */
        .reset-container { margin-top: 40px; }
        .reset-btn { background: #e74c3c; color: white; border: none; padding: 10px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .reset-btn:hover { background: #c0392b; box-shadow: 0 0 15px rgba(231,76,60,0.4); }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="room-title">房間：載入中...</h2>
        <div class="room-info">點選顏色後，每行限選一格。再次點擊可取消。</div>
    </div>

    <div class="color-picker">
        <div class="color-btn" style="background: #ff4d4d;" onclick="selectColor('red', this)"></div>
        <div class="color-btn" style="background: #4d94ff;" onclick="selectColor('blue', this)"></div>
        <div class="color-btn" style="background: #4dff88;" onclick="selectColor('green', this)"></div>
        <div class="color-btn" style="background: #ffdb4d;" onclick="selectColor('yellow', this)"></div>
    </div>

    <div id="grid" class="grid"></div>

    <div class="reset-container">
        <button class="reset-btn" onclick="resetAll()">重置所有格子</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('code') || '777';
        document.getElementById('room-title').innerText = `房間代碼：${roomCode}`;

        let currentColor = ''; 
        function selectColor(color, btn) {
            currentColor = color;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        const gridContainer = document.getElementById('grid');
        const colorClasses = ['bg-red', 'bg-blue', 'bg-green', 'bg-yellow'];

        for (let r = 1; r <= 10; r++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'row';
            
            const label = document.createElement('div');
            label.className = 'row-label';
            label.innerText = `第 ${r} 行`;
            rowDiv.appendChild(label);

            for (let c = 1; c <= 4; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = c;
                
                cell.onclick = () => {
                    if (!currentColor) {
                        alert('請先在上方選擇一個顏色！');
                        return;
                    }

                    const hasColor = colorClasses.some(cls => cell.classList.contains(cls));
                    const isSameColor = cell.classList.contains(`bg-${currentColor}`);

                    // 1. 如果點擊的是已經選中的顏色 -> 取消選取
                    if (isSameColor) {
                        cell.classList.remove(`bg-${currentColor}`);
                        return;
                    }

                    // 2. 如果這格已經有別的顏色 -> 跳出確定框
                    if (hasColor) {
                        if (!confirm("這格已經被選走了，你確定要覆蓋它嗎？")) {
                            return;
                        }
                    }

                    // 3. 每行只能點一個顏色 (先清除同一行的所有顏色)
                    const parentRow = cell.parentElement;
                    parentRow.querySelectorAll('.cell').forEach(sibling => {
                        colorClasses.forEach(cls => sibling.classList.remove(cls));
                    });

                    // 4. 上色
                    cell.classList.add(`bg-${currentColor}`);
                };
                rowDiv.appendChild(cell);
            }
            gridContainer.appendChild(rowDiv);
        }

        function resetAll() {
            if (confirm("確定要清空所有已選的格子嗎？")) {
                document.querySelectorAll('.cell').forEach(cell => {
                    colorClasses.forEach(cls => cell.classList.remove(cls));
                });
            }
        }
    </script>
</body>
</html>
