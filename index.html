<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人選色房間</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .header { margin-bottom: 20px; text-align: center; }
        .room-info { color: #888; font-size: 0.9rem; }

        /* 選擇顏色區 */
        .color-picker { display: flex; gap: 15px; margin-bottom: 30px; background: #333; padding: 15px; border-radius: 12px; }
        .color-btn { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; }
        .color-btn.active { border-color: white; transform: scale(1.2); }
        
        /* 10行x4格 網格區 */
        .grid { display: grid; grid-template-rows: repeat(10, 1fr); gap: 12px; }
        .row { display: flex; gap: 12px; align-items: center; }
        .row-label { width: 60px; color: #aaa; font-size: 0.8rem; }
        
        .cell {
            width: 60px; height: 45px; background: #444; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: bold; transition: background 0.3s;
        }

        /* 顏色定義 */
        .bg-red { background-color: #ff4d4d !important; color: white; }
        .bg-blue { background-color: #4d94ff !important; color: white; }
        .bg-green { background-color: #4dff88 !important; color: black; }
        .bg-yellow { background-color: #ffdb4d !important; color: black; }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="room-title">房間：載入中...</h2>
        <div class="room-info">先選顏色，再點格子</div>
    </div>

    <div class="color-picker">
        <div class="color-btn" style="background: #ff4d4d;" onclick="selectColor('red', this)"></div>
        <div class="color-btn" style="background: #4d94ff;" onclick="selectColor('blue', this)"></div>
        <div class="color-btn" style="background: #4dff88;" onclick="selectColor('green', this)"></div>
        <div class="color-btn" style="background: #ffdb4d;" onclick="selectColor('yellow', this)"></div>
    </div>

    <div id="grid" class="grid"></div>

    <script>
        // 1. 處理網址房號
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('code') || '預設房';
        document.getElementById('room-title').innerText = `房間代碼：${roomCode}`;

        // 2. 顏色選擇邏輯
        let currentColor = ''; 
        function selectColor(color, btn) {
            currentColor = color;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // 3. 生成 10行 x 4格
        const gridContainer = document.getElementById('grid');
        for (let r = 1; r <= 10; r++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'row';
            
            // 行標籤
            const label = document.createElement('div');
            label.className = 'row-label';
            label.innerText = `第 ${r} 行`;
            rowDiv.appendChild(label);

            for (let c = 1; c <= 4; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = c;
                
                cell.onclick = () => {
                    if (!currentColor) {
                        alert('請先在上方選擇一個顏色！');
                        return;
                    }
                    // 移除舊顏色並加上新顏色
                    cell.classList.remove('bg-red', 'bg-blue', 'bg-green', 'bg-yellow');
                    cell.classList.add(`bg-${currentColor}`);
                };
                rowDiv.appendChild(cell);
            }
            gridContainer.appendChild(rowDiv);
        }
    </script>
</body>
</html>
